name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Lance la suite Vitest + le rapport de couverture (seuils appliqués :
      # le job échoue si la couverture passe sous les seuils de vitest.config.js).
      - run: npm run coverage
